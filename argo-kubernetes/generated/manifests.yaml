# Source: argo/templates/events-and-eventsources.yaml
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: minio-sensor-1
spec:
  eventBusName: dataplatform-eventbus
  dependencies:
    - eventName: datalake-dsi-zip-event
      eventSourceName: minio-eventsource
      name: datalake-dsi-zip-sensor
  triggers:
    - template:
        name: unzip-dsi-trigger
        argoWorkflow:
          operation: submit
          parameters:
            - dest: spec.arguments.parameters.0.value
              src:
                dataKey: notification.0.s3.object.key
                dependencyName: datalake-dsi-zip-sensor
          source:
            resource:  # Removed duplicate 'source' key
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: unzip-dsi-
                namespace: argo
              spec:
                entrypoint: dag-unzip-dsi
                arguments:
                  parameters:
                    - name: key
                      value: OVERRIDEN
                templates:
                  - name: container-template
                    inputs:
                      parameters:
                        - name: key
                    container:
                      image: localhost:5001/dataplatform/unzip
                      command:
                        - python
                        - /app/unzip_to_minio.py
                      args:
                        - --bucket
                        - datalake-dsi
                        - --zip-source
                        - s3://datalake-dsi/{{inputs.parameters.key}}
                        - --prefix
                        - raw/{{inputs.parameters.key | split "/" | slice 1 5 | join "/"}}
                      env:
                        - name: AWS_ACCESS_KEY_ID
                          valueFrom:
                            secretKeyRef:
                              name: argo-secrets
                              key: accesskey
                        - name: AWS_SECRET_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: argo-secrets
                              key: secretkey
                        - name: AWS_ENDPOINT_URL
                          value: http://platform-storage-minio.storage.svc.cluster.local:9000
                  - name: dag-unzip-dsi
                    dag:
                      tasks:
                        - name: unzip-dsi
                          template: container-template
                          arguments:
                            parameters:
                              - name: key
                                value: '{{workflow.parameters.key}}'
                workflowMetadata:
                  labels:

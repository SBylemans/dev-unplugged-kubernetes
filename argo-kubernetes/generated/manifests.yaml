---
# Source: argo/templates/argo-secrets.yml
apiVersion: v1
data:
  accesskey: bG9jYWwtYWNjZXNz #gitleaks:allow
  secretkey: bG9jYWwtc2VjcmV0 #gitleaks:allow
kind: Secret
metadata:
  name: argo-secrets
  namespace: argo
---
# Source: argo/templates/roles.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-creator
  namespace: argo
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - create
      - patch
---
# Source: argo/templates/roles.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sensor-workflow-creator
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workflow-creator
subjects:
  - kind: ServiceAccount
    name: default
    namespace: argo
---
# Source: argo/templates/eventbus.yaml
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: dataplatform-eventbus
  namespace: argo
spec:
  jetstream:
    version: "latest"
    replicas: 3
    persistence:
      storageClassName: standard
      accessMode: ReadWriteOnce
      volumeSize: 10Gi
---
# Source: argo/templates/events-and-eventsources.yaml
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: minio-eventsource
  namespace: argo
spec:
  eventBusName: dataplatform-eventbus
  minio:
    datalake-test-zip-event:
      accessKey:
        key: accesskey
        name: argo-secrets
      bucket:
        name: datalake-test
      endpoint: platform-storage-minio.storage.svc.cluster.local:9000
      events:
        - s3:ObjectCreated:Put
      insecure: true
      secretKey:
        key: secretkey
        name: argo-secrets
      filter:
        suffix: .zip
    datalake-dsi-zip-event:
      accessKey:
        key: accesskey
        name: argo-secrets
      bucket:
        name: datalake-dsi
      endpoint: platform-storage-minio.storage.svc.cluster.local:9000
      events:
        - s3:ObjectCreated:Put
      insecure: true
      secretKey:
        key: secretkey
        name: argo-secrets
      filter:
        suffix: .zip
---
# Source: argo/templates/events-and-eventsources.yaml
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: minio-sensor-0
spec:
  eventBusName: dataplatform-eventbus
  dependencies:
    - eventName: datalake-test-zip-event
      eventSourceName: minio-eventsource
      name: datalake-test-zip-sensor
  triggers:
    - template:
        name: unzip-trigger
        argoWorkflow:
          operation: submit
          parameters:
            - dest: spec.arguments.parameters.0.value
              src:
                dataKey: notification.0.s3.object.key
                dependencyName: datalake-test-zip-sensor
          source:
            resource:  # Removed duplicate 'source' key
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: unzip-
                namespace: argo
              spec:
                entrypoint: dag-unzip
                arguments:
                  parameters:
                    - name: key
                      value: OVERRIDEN
                templates:
                  - name: container-template
                    inputs:
                      parameters:
                        - name: key
                    container:
                      image: localhost:5001/dataplatform/unzip
                      command:
                        - python
                        - /app/unzip_to_minio.py
                      args:
                        - --bucket
                        - datalake-test
                        - --zip-source
                        - s3://datalake-test/{{inputs.parameters.key}}
                        - --prefix
                        - map[raw:<nil>]
                      env:
                        - name: AWS_ACCESS_KEY_ID
                          valueFrom:
                            secretKeyRef:
                              name: argo-secrets
                              key: accesskey
                        - name: AWS_SECRET_ACCESS_KEY
                          valueFrom:
                            secretKeyRef:
                              name: argo-secrets
                              key: secretkey
                        - name: AWS_ENDPOINT_URL
                          value: http://platform-storage-minio.storage.svc.cluster.local:9000
                  - name: dag-unzip
                    dag:
                      tasks:
                        - name: unzip
                          template: container-template
                          arguments:
                            parameters:
                              - name: key
                                value: '{{workflow.parameters.key}}'
                workflowMetadata:
                  labels:
